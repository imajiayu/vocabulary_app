name: Deploy to VPS

on:
  push:
    branches:
      - main  # 推送到 main 分支时触发

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            echo "=========================================="
            echo "开始自动部署 vocabulary_app - $(date)"
            echo "=========================================="

            # 进入项目目录
            cd /root/vocabulary_app

            # 1. 拉取最新代码
            echo "📥 拉取最新代码..."
            git pull origin main

            # 2. 更新依赖并部署
            echo "📦 更新 Python 依赖..."
            source .venv/bin/activate
            pip install -r backend/requirements.txt

            echo "📦 更新前端依赖..."
            cd frontend
            npm install
            cd ..

            # 3. 执行完整部署
            echo "🚀 执行完整部署..."
            chmod +x start-production.sh
            ./start-production.sh deploy

            # 7. 验证部署
            echo "✅ 验证部署..."
            sleep 3
            curl -f http://localhost:5001/api/health || echo "⚠️ 后端健康检查失败"

            echo "=========================================="
            echo "✅ 部署完成 - $(date)"
            echo "=========================================="
