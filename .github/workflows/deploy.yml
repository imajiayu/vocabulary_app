name: Deploy to VPS

on:
  push:
    branches:
      - main  # 推送到 main 分支时触发

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            echo "=========================================="
            echo "开始自动部署 vocabulary_app - $(date)"
            echo "=========================================="

            # 进入项目目录
            cd /root/vocabulary_app

            # 1. 拉取最新代码
            echo "📥 拉取最新代码..."
            git pull origin main

            # 2. 构建前端
            echo "🔨 构建 Vue 前端..."
            cd vue_project
            npm install
            npm run build
            cd ..

            # 3. 复制前端文件到 Nginx 目录
            echo "📦 更新前端文件..."
            sudo cp -r vue_project/dist/* /var/www/vocabulary_app/
            sudo chown -R www-data:www-data /var/www/vocabulary_app

            # 4. 更新后端依赖
            echo "📦 更新 Python 依赖..."
            source .venv/bin/activate
            pip install -r web_app/requirements.txt

            # 5. 重启后端服务
            echo "🔄 重启后端服务..."
            ./start.sh stop || true
            sleep 2
            ./start.sh start

            # 6. 重载 Nginx
            echo "🌐 重载 Nginx..."
            sudo systemctl reload nginx

            # 7. 验证部署
            echo "✅ 验证部署..."
            sleep 3
            curl -f http://localhost:5001/api/health || echo "⚠️ 后端健康检查失败"

            echo "=========================================="
            echo "✅ 部署完成 - $(date)"
            echo "=========================================="
