<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IELTS 复习</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/review.css') }}" />
    <script src="{{ url_for('static', filename='js/review.js') }}" defer></script>
</head>

<body>
    <header class="top-bar">
        <a href="{{ url_for('index') }}" class="nav-link">← 返回设置</a>
        <span class="progress">{{ index + 1 }} / {{ total }}</span>
    </header>

    <main class="main-content">
        {% if word %}
        <div class="word" data-word="{{ word.word }}" data-word-id="{{ word.id }}" data-index="{{ index }}">{{ word.word
            }}</div>

        <div id="definition" class="definition" style="display:none;">{{ word.definition | trim | safe }}</div>

        <div id="buttons-wrapper">
            <!-- 初始选择按钮 -->
            <div class="row-buttons" id="choice-buttons">
                <button class="button" data-choice="yes">记住 ✅</button>
                <button class="button" data-choice="no">没记住 ❌</button>
            </div>

            <div class="row-buttons" id="stop-button-container">
                <button class="button full-width" data-choice="stop" id="stop-button">不再复习 🚫</button>
            </div>

            <!-- 展示释义后的按钮 -->
            <div class="row-buttons" id="revealed-buttons" style="display:none;">
                <button class="button" id="corrected-button">记错了 ❌</button>
                <button class="button" id="next-button">下一个 ➡️</button>
            </div>
        </div>

        {% else %}
        <p class="done-message">没有可复习的单词。</p>
        {% endif %}
    </main>
</body>

</html>
