<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IELTS 插入</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/insert.css') }}" />
    <script defer src="{{ url_for('static', filename='js/insert.js') }}"></script>
</head>

<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="nav-link">← 返回首页</a>
    </nav>

    <h1>插入新单词</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-messages">
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <!-- 插入表单 -->
    <form id="insert-form" action="{{ url_for('insert_page') }}" method="post">
        <label for="word">请输入单词：</label>
        <input type="text" id="word" name="word" required autocomplete="off" />
        <button type="submit">确定</button>
    </form>

    <!-- 搜索框 + 筛选按钮 -->
    <div class="search-container">
        <label for="search">搜索单词：</label>
        <input type="text" id="search" placeholder="输入前缀筛选..." />
        <div class="filter-btn-container">
            <button type="button" class="filter-btn" id="filter-unremembered">未记住 0</button>
            <button type="button" class="filter-btn" id="filter-remembered">已记住 0</button>
        </div>
    </div>

    <!-- 单词网格 -->
    <div class="word-grid" id="word-grid">
        {% for w in words %}
        <label class="word-item" data-ef="{{ w.ease_factor }}">
            <input type="checkbox" class="stop-review" data-id="{{ w.id }}" {% if w.stop_review or w.ease_factor>= 3.5
            %}checked{% endif %} />
            <span>{{ w.word }}</span>
        </label>
        {% endfor %}
    </div>
</body>

</html>
