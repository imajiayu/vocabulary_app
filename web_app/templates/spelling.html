<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IELTS 拼写</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/spelling.css') }}" />
    <script src="{{ url_for('static', filename='js/spelling.js') }}" defer></script>
</head>

<body>
    <header class="top-bar">
        <a href="{{ url_for('index') }}" class="nav-link">← 返回设置</a>
        <span class="progress">{{ index + 1 }} / {{ total }}</span>
    </header>

    <main class="main-content">
        {% if word %}
        <div class="spelling-container" data-word="{{ word.word }}" data-index="{{ index }}">
            <div class="left-pane">
                <div class="definition">{{ word.definition | trim | safe }}</div>
            </div>
            <div class="right-pane">
                <button class="button play-btn">🔊 播放音频</button>
                <input type="text" class="spelling-input" placeholder="输入单词拼写..." autocomplete="off" />
                <button class="button next-btn">下一个 ➡️</button>
            </div>
        </div>
        {% else %}
        <p class="done-message">没有可拼写的单词。</p>
        {% endif %}
    </main>
</body>

</html>
