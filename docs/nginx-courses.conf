# 课程模块 nginx 配置
#
# ========================================================================
# 重要：课程现已融入 Vue SPA，不再需要独立的 nginx location 块。
# ========================================================================
#
# 课程 JSON 位于 `frontend/public/{uk,legal}/*.json`，构建后进入 `dist/`，
# 由标准 SPA 配置自动伺服：
#
#   location / {
#       root /opt/vocabulary_app/frontend/dist;
#       try_files $uri $uri/ /index.html;
#   }
#
# `try_files` 逻辑：
#   - /uk/w3d1.json  → 文件存在于 dist/uk/ → 直接返回 JSON
#   - /uk/w3d1       → 不存在 → fallback 到 index.html → Vue Router 接管
#   - /legal/w1d2.json, /legal/w1d2 同理
#
# ========================================================================
# 服务器迁移步骤（从旧配置迁移到新 SPA）
# ========================================================================
#
# 1. 编辑 /etc/nginx/sites-enabled/vocabulary-app，删除以下已废弃的 location 块：
#
#    location = /uk  { return 301 /uk/; }
#    location = /legal { return 301 /legal/; }
#    location /uk/templates/ { alias /opt/vocabulary_app/courses/shared/; }
#    location /uk/ { alias /opt/vocabulary_app/courses/ukrainian/lessons/; }
#    location /legal/templates/ { alias /opt/vocabulary_app/courses/shared/; }
#    location /legal/ { alias /opt/vocabulary_app/courses/legal-english/lessons/; }
#
# 2. 确保主 `location /` 块存在并配置 try_files 到 index.html（见上方示例）。
#
# 3. 测试并重载：
#
#    sudo nginx -t
#    sudo systemctl reload nginx
