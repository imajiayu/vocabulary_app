# 课程模块 nginx 配置片段
# 添加到 /etc/nginx/sites-enabled/vocabulary-app 的 server {} 块内
# 替换原来指向 /root/clawd/ 的配置

# 无尾部斜杠时重定向到带斜杠版本
location = /uk  { return 301 /uk/; }
location = /legal { return 301 /legal/; }

# --- 乌克兰语课程 ---
location /uk/templates/ {
    alias /opt/vocabulary_app/courses/shared/;
}
location /uk/ {
    alias /opt/vocabulary_app/courses/ukrainian/lessons/;
}

# --- 法律英语课程 ---
location /legal/templates/ {
    alias /opt/vocabulary_app/courses/shared/;
}
location /legal/ {
    alias /opt/vocabulary_app/courses/legal-english/lessons/;
}
